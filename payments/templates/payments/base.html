<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Stripe Checkout{% endblock %}</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f9;
        --surface: #ffffff;
        --surface-2: #eef2f6;
        --text: #1f2933;
        --muted: #5f6c7b;
        --line: #d8dee6;
        --accent: #2563eb;
        --accent-dark: #1d4ed8;
        --danger: #b42318;
        --ok: #047857;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.5;
      }

      a {
        color: inherit;
      }

      .topbar {
        border-bottom: 1px solid var(--line);
        background: var(--surface);
      }

      .topbar-inner,
      .page {
        width: min(100% - 32px, 1040px);
        margin: 0 auto;
      }

      .topbar-inner {
        min-height: 64px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .brand {
        font-weight: 700;
        text-decoration: none;
      }

      .nav {
        display: flex;
        align-items: center;
        gap: 14px;
        color: var(--muted);
        font-size: 14px;
      }

      .page {
        padding: 32px 0 56px;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 320px;
        gap: 24px;
        align-items: start;
      }

      .panel,
      .card {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 8px;
      }

      .panel {
        padding: 28px;
      }

      .card {
        padding: 18px;
      }

      .stack {
        display: grid;
        gap: 16px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 16px;
      }

      h1,
      h2,
      p {
        margin-top: 0;
      }

      h1 {
        margin-bottom: 10px;
        font-size: clamp(28px, 4vw, 42px);
        line-height: 1.1;
      }

      h2 {
        margin-bottom: 12px;
        font-size: 20px;
      }

      .muted {
        color: var(--muted);
      }

      .price {
        font-size: 30px;
        font-weight: 800;
        letter-spacing: 0;
      }

      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 8px 0;
        border-bottom: 1px solid var(--surface-2);
      }

      .row:last-child {
        border-bottom: 0;
      }

      .button {
        width: 100%;
        min-height: 44px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        border: 0;
        border-radius: 8px;
        padding: 10px 14px;
        background: var(--accent);
        color: white;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
        text-decoration: none;
      }

      .button:hover {
        background: var(--accent-dark);
      }

      .button.secondary {
        border: 1px solid var(--line);
        background: var(--surface);
        color: var(--text);
      }

      .button.secondary:hover {
        background: var(--surface-2);
      }

      .button:disabled {
        cursor: not-allowed;
        opacity: 0.65;
      }

      .message {
        min-height: 24px;
        color: var(--danger);
        font-size: 14px;
      }

      .message.ok {
        color: var(--ok);
      }

      .list-link {
        display: block;
        color: inherit;
        text-decoration: none;
      }

      .list-link:hover .card {
        border-color: var(--accent);
      }

      @media (max-width: 760px) {
        .topbar-inner {
          align-items: flex-start;
          flex-direction: column;
          padding: 14px 0;
        }

        .layout {
          grid-template-columns: 1fr;
        }
      }
    </style>
    {% block head %}{% endblock %}
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <a class="brand" href="{% url 'payments:index' %}">Django Stripe Store</a>
        <nav class="nav">
          <a href="{% url 'payments:index' %}">Store</a>
          <a href="/admin/">Admin</a>
        </nav>
      </div>
    </header>
    <main class="page">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
