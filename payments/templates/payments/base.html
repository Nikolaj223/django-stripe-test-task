<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Stripe Checkout{% endblock %}</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f1f5f0;
        --paper: #fffaf0;
        --paper-strong: #fff6df;
        --ink: #17201c;
        --muted: #5f6b62;
        --line: #22352b;
        --line-soft: rgba(34, 53, 43, 0.18);
        --teal: #0f7f75;
        --teal-dark: #085e57;
        --coral: #df5b4f;
        --mustard: #e8b436;
        --sky: #8fc7cf;
        --danger: #a42a1f;
        --ok: #137c4a;
        --shadow: 8px 8px 0 rgba(23, 32, 28, 0.16);
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-width: 320px;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(90deg, rgba(23, 32, 28, 0.04) 1px, transparent 1px),
          linear-gradient(0deg, rgba(23, 32, 28, 0.04) 1px, transparent 1px),
          var(--bg);
        background-size: 38px 38px;
        color: var(--ink);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.5;
      }

      a {
        color: inherit;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 10;
        border-bottom: 2px solid var(--line);
        background: rgba(255, 250, 240, 0.92);
        backdrop-filter: blur(14px);
      }

      .topbar-inner,
      .page {
        width: min(100% - 32px, 1180px);
        margin: 0 auto;
      }

      .topbar-inner {
        min-height: 72px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        font-weight: 900;
        letter-spacing: 0;
        text-decoration: none;
      }

      .brand-mark {
        width: 38px;
        height: 38px;
        display: inline-grid;
        place-items: center;
        border: 2px solid var(--line);
        border-radius: 8px;
        background: var(--mustard);
        box-shadow: 4px 4px 0 var(--line);
        font-weight: 950;
      }

      .nav {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .nav a {
        min-height: 38px;
        display: inline-flex;
        align-items: center;
        border: 2px solid transparent;
        border-radius: 8px;
        padding: 7px 12px;
        color: var(--muted);
        font-size: 14px;
        font-weight: 800;
        text-decoration: none;
      }

      .nav a:hover {
        border-color: var(--line);
        background: var(--sky);
        color: var(--ink);
      }

      .page {
        padding: 42px 0 72px;
      }

      .stack {
        display: grid;
        gap: 22px;
      }

      .hero {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(260px, 400px);
        gap: 24px;
        align-items: stretch;
        margin-bottom: 34px;
      }

      .hero-copy,
      .hero-ticket,
      .panel,
      .card,
      .checkout-card {
        border: 2px solid var(--line);
        border-radius: 8px;
        background: var(--paper);
        box-shadow: var(--shadow);
      }

      .hero-copy {
        min-height: 240px;
        display: grid;
        align-content: end;
        padding: 34px;
        background:
          linear-gradient(135deg, rgba(232, 180, 54, 0.42), transparent 46%),
          linear-gradient(315deg, rgba(15, 127, 117, 0.18), transparent 48%),
          var(--paper);
      }

      .hero-ticket {
        display: grid;
        grid-template-rows: auto 1fr;
        overflow: hidden;
      }

      .ticket-top {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        border-bottom: 2px dashed var(--line);
        padding: 18px 20px;
        background: var(--coral);
        color: white;
        font-size: 13px;
        font-weight: 900;
        text-transform: uppercase;
      }

      .ticket-body {
        display: grid;
        align-content: end;
        gap: 12px;
        padding: 22px;
      }

      .section-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .section-title::after {
        content: "";
        min-width: 40px;
        height: 10px;
        flex: 1;
        border-top: 2px solid var(--line);
        border-bottom: 2px solid var(--line);
        opacity: 0.35;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
        gap: 22px;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 360px;
        gap: 26px;
        align-items: start;
      }

      .panel {
        padding: 30px;
      }

      .card {
        min-height: 260px;
        display: grid;
        grid-template-rows: 156px 1fr;
        overflow: hidden;
        transition: transform 160ms ease, box-shadow 160ms ease;
      }

      .list-link {
        display: block;
        color: inherit;
        text-decoration: none;
      }

      .list-link:hover .card {
        box-shadow: 12px 12px 0 rgba(23, 32, 28, 0.2);
        transform: translate(-3px, -3px);
      }

      .card-body {
        display: grid;
        gap: 12px;
        padding: 22px;
      }

      .checkout-card {
        display: grid;
        gap: 18px;
        padding: 22px;
        background: var(--paper-strong);
      }

      .product-art {
        position: relative;
        min-height: 156px;
        overflow: hidden;
        border-bottom: 2px solid var(--line);
        background:
          repeating-linear-gradient(135deg, rgba(23, 32, 28, 0.08) 0 10px, transparent 10px 20px),
          var(--sky);
      }

      .product-art::before,
      .product-art::after {
        content: "";
        position: absolute;
        border: 2px solid var(--line);
      }

      .product-art.hoodie {
        background:
          linear-gradient(135deg, var(--sky) 0 42%, var(--mustard) 42% 66%, var(--paper) 66%);
      }

      .product-art.hoodie::before {
        width: 132px;
        height: 92px;
        left: 50%;
        bottom: 24px;
        border-radius: 44px 44px 8px 8px;
        background: var(--teal);
        transform: translateX(-50%);
      }

      .product-art.hoodie::after {
        width: 54px;
        height: 40px;
        left: 50%;
        bottom: 78px;
        border-bottom: 0;
        border-radius: 36px 36px 0 0;
        background: var(--paper);
        transform: translateX(-50%);
      }

      .product-art.mug {
        background:
          linear-gradient(135deg, var(--coral) 0 38%, var(--paper) 38% 68%, var(--sky) 68%);
      }

      .product-art.mug::before {
        width: 96px;
        height: 82px;
        left: calc(50% - 28px);
        bottom: 28px;
        border-radius: 8px 8px 26px 26px;
        background: var(--paper);
      }

      .product-art.mug::after {
        width: 52px;
        height: 52px;
        left: calc(50% + 50px);
        bottom: 44px;
        border-radius: 50%;
        border-left-color: transparent;
        background: transparent;
      }

      .product-art.bundle {
        background:
          linear-gradient(135deg, var(--mustard) 0 34%, var(--teal) 34% 62%, var(--coral) 62%);
      }

      .product-art.bundle::before {
        width: 144px;
        height: 88px;
        left: 50%;
        bottom: 30px;
        border-radius: 8px;
        background: var(--paper);
        transform: translateX(-50%) rotate(-3deg);
      }

      .product-art.bundle::after {
        width: 108px;
        height: 68px;
        left: 50%;
        bottom: 58px;
        border-radius: 8px;
        background: var(--sky);
        transform: translateX(-50%) rotate(5deg);
      }

      .detail-art {
        min-height: 340px;
        border: 2px solid var(--line);
        border-radius: 8px;
        box-shadow: var(--shadow);
      }

      h1,
      h2,
      p {
        margin-top: 0;
      }

      h1 {
        max-width: 820px;
        margin-bottom: 12px;
        font-size: clamp(42px, 7vw, 76px);
        line-height: 0.95;
        letter-spacing: 0;
      }

      h2 {
        margin-bottom: 0;
        font-size: 24px;
        line-height: 1.15;
        letter-spacing: 0;
      }

      .eyebrow {
        margin-bottom: 12px;
        color: var(--teal-dark);
        font-size: 13px;
        font-weight: 950;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .muted {
        color: var(--muted);
        font-size: 17px;
      }

      .price {
        font-size: clamp(34px, 5vw, 54px);
        font-weight: 950;
        letter-spacing: 0;
        line-height: 1;
      }

      .mini-price {
        font-size: 34px;
        font-weight: 950;
        letter-spacing: 0;
        line-height: 1;
      }

      .badge-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .badge {
        display: inline-flex;
        min-height: 34px;
        align-items: center;
        border: 2px solid var(--line);
        border-radius: 8px;
        padding: 5px 10px;
        background: var(--mustard);
        font-size: 13px;
        font-weight: 900;
      }

      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        padding: 12px 0;
        border-bottom: 2px dashed var(--line-soft);
      }

      .row:last-child {
        border-bottom: 0;
      }

      .button {
        width: 100%;
        min-height: 50px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        border: 2px solid var(--line);
        border-radius: 8px;
        padding: 12px 16px;
        background: var(--teal);
        color: white;
        box-shadow: 5px 5px 0 var(--line);
        font: inherit;
        font-weight: 950;
        cursor: pointer;
        text-decoration: none;
        transition: transform 120ms ease, box-shadow 120ms ease, background 120ms ease;
      }

      .button:hover {
        background: var(--teal-dark);
        box-shadow: 3px 3px 0 var(--line);
        transform: translate(2px, 2px);
      }

      .button.secondary {
        background: var(--paper);
        color: var(--ink);
      }

      .button.secondary:hover {
        background: var(--mustard);
      }

      .button:disabled {
        cursor: not-allowed;
        opacity: 0.65;
      }

      .message {
        min-height: 24px;
        color: var(--danger);
        font-size: 14px;
        font-weight: 800;
      }

      .message.ok {
        color: var(--ok);
      }

      .empty-state {
        border: 2px dashed var(--line);
        border-radius: 8px;
        padding: 22px;
        background: rgba(255, 250, 240, 0.7);
      }

      @media (max-width: 860px) {
        .hero,
        .layout {
          grid-template-columns: 1fr;
        }

        .detail-art {
          min-height: 240px;
        }
      }

      @media (max-width: 620px) {
        .topbar-inner {
          align-items: flex-start;
          flex-direction: column;
          padding: 14px 0;
        }

        .page {
          padding-top: 28px;
        }

        .hero-copy,
        .panel {
          padding: 24px;
        }

        .grid {
          grid-template-columns: 1fr;
        }

        .section-title {
          align-items: flex-start;
          flex-direction: column;
        }

        .section-title::after {
          width: 100%;
          flex: none;
        }
      }
    </style>
    {% block head %}{% endblock %}
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <a class="brand" href="{% url 'payments:index' %}">
          <span class="brand-mark">DS</span>
          <span>Django Stripe Store</span>
        </a>
        <nav class="nav">
          <a href="{% url 'payments:index' %}">Store</a>
          <a href="/admin/">Admin</a>
        </nav>
      </div>
    </header>
    <main class="page">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
